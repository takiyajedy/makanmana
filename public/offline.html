<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anda di luar talian — MakanMana</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
            background: linear-gradient(135deg, #ff8a3d 0%, #ff5722 55%, #f7411e 100%);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 24px;
        }
        .box { max-width: 380px; }
        .logo { font-size: 4rem; margin-bottom: 16px; }
        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em; }
        p { opacity: .92; margin-top: 10px; line-height: 1.55; }
        button {
            margin-top: 24px; font: inherit; font-weight: 700; cursor: pointer; color: #ff5722;
            background: #fff; border: none; border-radius: 14px; padding: 13px 26px;
            box-shadow: 0 12px 26px -10px rgba(0,0,0,.4);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">🍽️</div>
        <h1>Anda di luar talian</h1>
        <p>MakanMana perlukan sambungan internet untuk muatkan peta &amp; cadangan tempat makan. Sila semak sambungan anda.</p>
        <button onclick="location.reload()">Cuba lagi</button>
    </div>
</body>
</html>
